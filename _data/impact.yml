# Each topic maps to a research paper/project and its real-world impact.
# To add a new topic: copy a block below and fill in the fields.
#
# Fields:
#   id:        unique slug, used for filtering and CSS color class
#   title:     display name shown in header and filter button
#   color:     CSS class suffix for left-border color (defined in _impact.scss)
#   subtitle:  one-line description shown below the title
#   paper:
#     venue:   short venue name (e.g., "USENIX Security 2026")
#     title:   full paper title
#     link:    URL to paper page or PDF
#   sections:  list of impact categories (use consistent names across topics)
#     - title: category name (e.g., "Regulatory & Policy", "Platform & Technical")
#       icon:  Font Awesome icon name without "fa-solid fa-" prefix
#       wide:  true to span full width (optional, default false)
#       items: list of HTML strings (links, bold, etc. are fine)
#   press:     optional collapsible press coverage
#     label:   summary text (e.g., "Press Coverage & Commentary")
#     count:   badge text (e.g., "15+ outlets")
#     items:   list of {outlet, title, url}
#     commentary_label: optional subheading for commentary section
#     commentary:       optional list of {outlet, title, url}

- id: localhost
  title: Localhost Tracking
  color: localhost
  subtitle: "Silent web-to-app tracking on mobile via localhost &mdash; exposing how Meta and Yandex covertly tracked Android users' browsing across apps."
  paper:
    venue: USENIX Security 2026
    title: "Bridges to Self: Silent Web-to-App Tracking on Mobile via Localhost"
    link: https://localmess.github.io/
  sections:
    - title: "Regulatory & Policy"
      icon: landmark
      items:
        - 'The <strong>Spanish Prime Minister</strong> <a href="https://www.lamoncloa.gob.es/lang/en/presidente/news/paginas/2025/20251119-metafuture-4th-edition.aspx">cited the research</a> to announce a parliamentary investigation into Meta. Our team <strong>testified</strong> before the Spanish Congress commission.'
        - 'Members of the <strong>U.S. House of Representatives</strong> cited the research in a <a href="https://schakowsky.house.gov/sites/evo-subsites/schakowsky.house.gov/files/evo-media-document/letter-to-meta-concerning-violation-of-android-privacy-protections.pdf">formal inquiry to Meta leadership</a>.'
        - 'Class actions filed in the U.S. (<a href="https://www.pacermonitor.com/public/case/58359378/Rose_v_Meta_Platforms,_Inc">Rose v. Meta</a>, Carroll, Zaveeri), Canada, and Germany.'
        - 'Disclosures to CNIL, EDPS, AEPD, EDPB, UK CMA, and the European Commission.'
        - 'Civil society response from <a href="https://www.eff.org/deeplinks/2025/06/protect-yourself-metas-latest-attack-privacy">EFF</a> and <a href="https://privacyinternational.org/long-read/5621/meta-and-yandex-break-security-save-their-business-model">Privacy International</a>.'
    - title: "Platform & Technical"
      icon: shield-halved
      items:
        - 'Google introduced a <a href="https://web.archive.org/web/20260214205048/https://developer.android.com/about/versions/17/behavior-changes-17#localhost-protections">localhost permission in Android 17</a> to prevent platform-wide abuse.'
        - '<a href="https://chromestatus.com/feature/5765473641725952">Chrome 137</a> and <a href="https://bugzilla.mozilla.org/show_bug.cgi?id=1969916">Firefox</a> deployed localhost access restrictions. <a href="https://bugs.webkit.org/show_bug.cgi?id=171934#c111">WebKit</a> engaged with findings.'
        - 'Advanced the W3C Local Network Access (LNA) standard. Disclosed bypass vectors.'
        - 'Invited to present at <a href="https://datatracker.ietf.org/meeting/123/materials/slides-123-pearg-covert-web-to-app-tracking-via-localhost-on-android-00">IETF PEARG 123</a> and the <a href="https://www.youtube.com/watch?v=mIUmNl1WKUs">Ad-Filtering Dev Summit 2025</a>.'
        - '<a href="https://github.com/uBlockOrigin/uAssets/blob/f7b32ede2447603d889685925d2be05cc505f0f1/filters/privacy.txt#L1544-L1545">uBlock Origin</a>, <a href="https://adguard.com/en/blog/meta-yandex-abuse-localhost-to-track-users.html">AdGuard</a>, and DuckDuckGo adopted tracking protections based on our findings.'
    - title: "Industry Response"
      icon: building
      wide: true
      items:
        - 'Meta and Yandex <strong>terminated the abuse on the day of public disclosure</strong>.'
        - 'VPN vulnerability and cross-profile tracking vectors disclosed to Google.'
