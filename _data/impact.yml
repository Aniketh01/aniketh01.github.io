- id: iot
  title: "Smart Home / IoT"
  color: iot
  subtitle: "Exposing how local network protocols in smart homes violate platform access control assumptions &mdash; apps bypass Android's permission model to harvest device metadata."
  paper:
    venue: IMC 2023
    title: "In the Room Where It Happens: Characterizing Local Communication and Threats in Smart Homes"
    link: https://doi.org/10.1145/3618257.3624830
  sections:
    - title: "Platform & Technical"
      icon: shield-halved
      items:
        - 'Google introduced a <a href="https://developer.android.com/reference/android/Manifest.permission#ACCESS_LOCAL_NETWORK">dedicated local network permission</a> in Android 16.'
        - 'Dozens of privacy-invasive apps and SDKs removed from the Google Play Store.'
        - '20+ IoT vendors (Philips, Google, TP-Link, Apple) <strong>redesigned identifier schemes</strong>.'
    - title: "Regulatory & Policy"
      icon: landmark
      items:
        - 'Presented at CNIL Privacy Research Day 2024, RIPE 89 Plenary (Prague), and RediMadrid Conference.'
        - 'Findings shared with EDPS, AEPD, and CNIL.'
    - title: "Industry Response"
      icon: building
      wide: true
      items:
        - 'Google publicly recognized the real-world impact of our findings, awarded a <strong>$2,000 bug bounty</strong> (donated to M&eacute;decins Sans Fronti&egrave;res), and engaged with us to explore mitigations via Android OS, app review processes, and IoT standardization efforts.'
  press:
    label: "Press Coverage"
    count: "5+ outlets"
    items:
      - outlet: "El Pa&iacute;s"
        title: "How smart devices spy on us and reveal information about our homes"
        url: https://elpais.com/tecnologia/2023-10-smart-devices-spy.html
      - outlet: Wired
        title: "Los dispositivos de tu hogar inteligente te esp&iacute;an"
        url: https://www.wired.com/story/smart-home-devices-privacy/
      - outlet: CBS News
        title: "Are your home's smart devices leaking private data?"
        url: https://www.cbsnews.com/calgary/smart-devices-leaking-private-data/

- id: wireless
